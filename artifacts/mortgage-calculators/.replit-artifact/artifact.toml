kind = "web"
previewPath = "/"
title = "Mortgage Calculators"
version = "1.0.0"
id = "artifacts/mortgage-calculators"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23382
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mortgage-calculators run dev"

[services.env]
PORT = "23382"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mortgage-calculators", "run", "build"]
publicDir = "artifacts/mortgage-calculators/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
